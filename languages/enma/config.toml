name = "Enma"
grammar = "enma"
path_suffixes = ["em"]
line_comments = ["// "]
block_comments = ["/* ", " */"]
brackets = [
    { start = "(", end = ")", close = true, newline = false },
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = false },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
    { start = "/*", end = " */", close = true, newline = true, not_in = ["comment"] },
]
